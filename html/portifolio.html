<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Carpintaria Nascimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/home-colors.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/portifolio.css">
</head>
<body class="bg-[var(--bg-body)] text-[var(--texto-principal)] selection:bg-amber-200">

    <!-- Header / Nav -->
    <nav class="sticky top-0 left-0 right-0 z-50 w-full px-4 py-3 flex flex-wrap items-center justify-between gap-3 bg-stone-900/70 backdrop-blur-md border-b border-stone-800/50">
        <a href="../index.html" class="flex items-center group">
            <div class="text-white font-bold text-xl tracking-wider uppercase">
                Carpintaria <span class="text-amber-500">Nascimento</span>
            </div>
        </a>

        <div id="main-nav" class="flex flex-wrap items-center gap-4 text-white font-medium text-sm uppercase tracking-widest w-full md:w-auto mt-3 md:mt-0 p-4 md:p-0 rounded-2xl md:rounded-none bg-stone-900/95 md:bg-transparent">
            <a href="../index.html" class="hover:text-amber-500 transition">Início</a>
            <a href="servicos.html" class="hover:text-amber-500 transition">Serviços</a>
            <a href="portifolio.html" class="text-amber-500 transition font-bold border-b-2 border-amber-500">Portfólio</a>
            <a href="sobre.html" class="hover:text-amber-500 transition">Sobre</a>
            <a href="contato.html" class="hover:text-amber-500 transition">Contato</a>
            <a href="https://www.instagram.com/contrucaocarpintarianascimento?igsh=MWI5ZDY3cGlicGFqaQ==" target="_blank" rel="noopener noreferrer" aria-label="Instagram Carpintaria Nascimento" class="ml-2 inline-flex items-center justify-center w-9 h-9 rounded bg-amber-700/10 hover:bg-amber-700/20 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-500" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm4.75-.88a1.13 1.13 0 1 1 0 2.25 1.13 1.13 0 0 1 0-2.25z"/>
                </svg>
            </a>
        </div>
    </nav>

    <!-- Hero Portfólio -->
    <section class="relative py-32 flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: linear-gradient(rgba(9, 7, 5, 0.85), rgba(9, 7, 5, 0.85)), url('../imagens/fundo.jpeg');">
        </div>
        <div class="relative z-10 max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-4xl md:text-6xl text-[var(--texto-titulo)] mb-6 leading-tight">
                Nossas <span class="italic text-amber-500">Obras Entregues</span>
            </h1>
            <p class="text-lg md:text-xl text-[var(--texto-suave)] max-w-2xl mx-auto uppercase tracking-widest">
                A transformação da madeira bruta em projetos de alto padrão.
            </p>
        </div>
    </section>

    <!-- Galeria de Fotos (dinâmica) -->
    <section class="py-24 px-6">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-bold text-white mb-12 uppercase tracking-tighter border-l-4 border-amber-500 pl-4">Galeria de Projetos</h2>
            <div id="gallery-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </section>

    <!-- Seção de Vídeos -->
    <section class="py-24 px-6 bg-stone-950">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-bold text-white mb-12 uppercase tracking-tighter border-l-4 border-amber-500 pl-4">Processos em Vídeo</h2>
            <div class="grid md:grid-cols-2 gap-8" id="video-grid">
                <!-- Vídeos serão carregados dinamicamente -->
            </div>
        </div>
    </section>

    <footer class="bg-stone-950 text-stone-400 py-12 px-6 border-t border-stone-900 text-center md:text-left">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-4">
                <div class="text-white font-bold text-lg uppercase tracking-wider">Carpintaria <span class="text-amber-500">Nascimento</span></div>
                <a href="https://www.instagram.com/contrucaocarpintarianascimento?igsh=MWI5ZDY3cGlicGFqaQ==" target="_blank" rel="noopener noreferrer" aria-label="Instagram Carpintaria Nascimento" class="inline-flex items-center justify-center w-9 h-9 rounded bg-amber-700/10 hover:bg-amber-700/20 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-500" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm4.75-.88a1.13 1.13 0 1 1 0 2.25 1.13 1.13 0 0 1 0-2.25z"/>
                    </svg>
                </a>
            </div>
            <p class="text-sm">© 2024 Jonas Nascimento - Belo Horizonte/MG.</p>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/95 items-center justify-center p-4 backdrop-blur-sm">
        <button id="close-lightbox" class="absolute top-6 right-6 text-white hover:text-amber-500 transition-colors z-[60]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        
        <!-- Botão Anterior -->
        <button id="prev-lightbox" class="absolute left-6 text-white hover:text-amber-500 transition-colors z-[60] hidden md:block">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <div class="flex flex-col items-center max-w-5xl w-full">
            <img id="lightbox-img" src="" alt="Imagem Ampliada" class="max-w-full max-h-[85vh] rounded-sm shadow-2xl object-contain">
            <p id="lightbox-caption" class="text-white mt-4 font-bold uppercase tracking-widest text-center"></p>
        </div>
        <!-- Botão Próximo -->
        <button id="next-lightbox" class="absolute right-6 text-white hover:text-amber-500 transition-colors z-[60] hidden md:block">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>

    <script src="../js/common.js" defer></script>
    <script src="../js/portifolio.js" defer></script>
</body>
</html>
